apiVersion: v1
kind: ConfigMap
metadata:
  name: eldercare-env
  namespace: eldercare-prod
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  NEXT_PUBLIC_API_BASE_URL: "https://api.eldr.care"
  NEXT_PUBLIC_WEB_BASE_URL: "https://eldr.care"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: eldercare-prod
data:
  postgresql.conf: |
    max_connections = 500
    shared_buffers = 256MB
    effective_cache_size = 1GB
    maintenance_work_mem = 64MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: eldercare-prod
data:
  upstream.conf: |
    upstream api_backend {
      least_conn;
      server api:8000 max_fails=3 fail_timeout=30s;
      keepalive 32;
    }
    upstream web_backend {
      least_conn;
      server web:3000 max_fails=3 fail_timeout=30s;
      keepalive 32;
    }
