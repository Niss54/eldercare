apiVersion: v1
kind: Namespace
metadata:
  name: eldercare-prod
  labels:
    environment: production
---
apiVersion: v1
kind: Namespace
metadata:
  name: eldercare-staging
  labels:
    environment: staging
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-pdb
  namespace: eldercare-prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-pdb
  namespace: eldercare-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: web
