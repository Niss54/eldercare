replicaCount:
  api: 3
  web: 2
  worker: 3
  scheduler: 1

image:
  repository: eldercare
  tag: latest
  pullPolicy: Always

nodeName: ""
nodeSelector: {}
affinity: {}
tolerations: []

api:
  port: 8000
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  
  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /api/v1/health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 3

web:
  port: 3000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  livenessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 3

worker:
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1Gi

scheduler:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

postgres:
  enabled: true
  storage: 100Gi
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 4Gi

redis:
  enabled: true
  maxmemory: 2gb

autoscaling:
  api:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  web:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: eldr.care
      paths:
        - path: /
          pathType: Prefix
    - host: api.eldr.care
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: eldercare-tls
      hosts:
        - eldr.care
        - api.eldr.care

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

serviceAccount:
  create: true
  annotations: {}
  name: ""

namespace: eldercare-prod

env:
  APP_ENV: production
  LOG_LEVEL: info
  NEXT_PUBLIC_API_BASE_URL: https://api.eldr.care
  NEXT_PUBLIC_WEB_BASE_URL: https://eldr.care

monitoring:
  enabled: true
  prometheusServiceMonitor:
    enabled: true

backups:
  enabled: true
  schedule: "0 2 * * *"
  retention: 30
