version: '3.8'

services:
  # PostgreSQL Database with high availability
  postgres:
    image: postgres:15-alpine
    container_name: eldercare-postgres-prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-c max_connections=500 -c shared_buffers=256MB -c effective_cache_size=1GB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/backup:/backup
      - ./infra/db/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eldercare-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

  # Redis with persistence
  redis:
    image: redis:7-alpine
    container_name: eldercare-redis-prod
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 2gb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eldercare-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # MinIO S3-compatible storage (production config)
  minio:
    image: minio/minio:latest
    container_name: eldercare-minio-prod
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eldercare-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

  # FastAPI Backend (3 replicas for high availability)
  api_1:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: eldercare-api:${APP_VERSION:-latest}
    container_name: eldercare-api-prod-1
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: us-east-1
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY}
      LOG_LEVEL: info
      SENTRY_DSN: ${SENTRY_DSN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - eldercare-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1.5G

  api_2:
    extends:
      service: api_1
    container_name: eldercare-api-prod-2
    environment:
      APP_ENV: production

  api_3:
    extends:
      service: api_1
    container_name: eldercare-api-prod-3
    environment:
      APP_ENV: production

  # Next.js Frontend (2 replicas)
  web_1:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: eldercare-web:${APP_VERSION:-latest}
    container_name: eldercare-web-prod-1
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: https://api.eldr.care
      NEXT_PUBLIC_WEB_BASE_URL: https://eldr.care
    depends_on:
      - api_1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - eldercare-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G

  web_2:
    extends:
      service: web_1
    container_name: eldercare-web-prod-2

  # Celery Workers (3 replicas for resilience)
  worker_1:
    build:
      context: ./apps/api
      dockerfile: ../../apps/worker/Dockerfile
    image: eldercare-worker:${APP_VERSION:-latest}
    container_name: eldercare-worker-prod-1
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      LOG_LEVEL: info
      SENTRY_DSN: ${SENTRY_DSN}
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - eldercare-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  worker_2:
    extends:
      service: worker_1
    container_name: eldercare-worker-prod-2

  worker_3:
    extends:
      service: worker_1
    container_name: eldercare-worker-prod-3

  # Celery Beat Scheduler (single instance)
  scheduler:
    build:
      context: ./apps/api
      dockerfile: ../../apps/scheduler/Dockerfile
    image: eldercare-scheduler:${APP_VERSION:-latest}
    container_name: eldercare-scheduler-prod
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      LOG_LEVEL: info
      SENTRY_DSN: ${SENTRY_DSN}
    depends_on:
      - postgres
      - redis
    networks:
      - eldercare-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # Nginx Reverse Proxy with SSL termination
  nginx:
    build:
      context: ./apps/nginx
      dockerfile: Dockerfile
    image: eldercare-nginx:${APP_VERSION:-latest}
    container_name: eldercare-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api_1
      - api_2
      - api_3
      - web_1
      - web_2
    volumes:
      - ./apps/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./apps/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/ssl/prod:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - eldercare-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nginx_cache:

networks:
  eldercare-prod:
    driver: bridge
