name: Container Security Scanning

on:
  push:
    branches:
      - main
      - staging
  schedule:
    # Run nightly security scans
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scan-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Scan Python dependencies
        run: |
          pip install safety pip-audit
          cd apps/api
          safety check --json > safety-report.json || true
          pip-audit --desc > pip-audit-report.txt || true

      - name: Scan JavaScript dependencies
        run: |
          cd apps/web
          npm audit --json > npm-audit-report.json || true

      - name: Upload dependency reports
        uses: actions/upload-artifact@v3
        with:
          name: dependency-scan-reports
          path: |
            safety-report.json
            pip-audit-report.txt
            npm-audit-report.json

  build-and-scan-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t eldercare-api:${{ github.sha }} ./apps/api

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: eldercare-api:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy image results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-image-results.sarif'

      - name: Run Grype scan
        uses: anchore/scan-action@v3
        id: grype
        with:
          path: 'apps/api'
          fail-build: false
          severity-cutoff: high

      - name: Upload Grype results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}

  build-and-scan-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t eldercare-web:${{ github.sha }} ./apps/web

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: eldercare-web:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-web-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-web-results.sarif'

  sign-images:
    needs: [build-and-scan-api, build-and-scan-web]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and sign API image
        run: |
          docker build -t ghcr.io/${{ github.repository }}-api:${{ github.sha }} ./apps/api
          docker push ghcr.io/${{ github.repository }}-api:${{ github.sha }}
          
          cosign sign --key ${{ secrets.COSIGN_PRIVATE_KEY }} \
            ghcr.io/${{ github.repository }}-api:${{ github.sha }}

      - name: Build and sign Web image
        run: |
          docker build -t ghcr.io/${{ github.repository }}-web:${{ github.sha }} ./apps/web
          docker push ghcr.io/${{ github.repository }}-web:${{ github.sha }}
          
          cosign sign --key ${{ secrets.COSIGN_PRIVATE_KEY }} \
            ghcr.io/${{ github.repository }}-web:${{ github.sha }}

      - name: Generate SBOM with Syft
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh) -b /usr/local/bin
          syft ghcr.io/${{ github.repository }}-api:${{ github.sha }} -o json > api-sbom.json
          syft ghcr.io/${{ github.repository }}-web:${{ github.sha }} -o json > web-sbom.json

      - name: Attach SBOM to image
        run: |
          cosign attach sbom --sbom api-sbom.json \
            ghcr.io/${{ github.repository }}-api:${{ github.sha }}
          cosign attach sbom --sbom web-sbom.json \
            ghcr.io/${{ github.repository }}-web:${{ github.sha }}
