# Upstream services
upstream api {
  least_conn;
  server api:8000 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

upstream web {
  least_conn;
  server web:3000 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

# HTTP redirect to HTTPS (in production)
server {
  listen 80;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS server (or HTTP for local dev)
server {
  listen 80;  # Change to 443 ssl http2 in production with valid cert
  server_name api.localhost api.staging.eldr.care api.example.com;

  # SSL configuration (uncomment for production)
  # ssl_certificate /etc/nginx/ssl/cert.pem;
  # ssl_certificate_key /etc/nginx/ssl/key.pem;
  # ssl_protocols TLSv1.2 TLSv1.3;
  # ssl_ciphers HIGH:!aNULL:!MD5;
  # ssl_prefer_server_ciphers on;

  # API reverse proxy
  location / {
    proxy_pass http://api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # WebSocket upgrade
  location ~ ^/api/v1/ws/ {
    proxy_pass http://api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400;
  }
}

server {
  listen 80;  # Change to 443 ssl http2 in production
  server_name web.localhost web.staging.eldr.care example.com www.example.com;

  # SSL configuration (uncomment for production)
  # ssl_certificate /etc/nginx/ssl/cert.pem;
  # ssl_certificate_key /etc/nginx/ssl/key.pem;

  # Web application reverse proxy
  location / {
    proxy_pass http://web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # Next.js static assets (cache aggressively)
  location /_next/static/ {
    proxy_pass http://web;
    proxy_cache_valid 1y;
    add_header Cache-Control "public, immutable";
  }

  # Public assets (cache for a day)
  location /public/ {
    proxy_pass http://web;
    proxy_cache_valid 1d;
    add_header Cache-Control "public, max-age=86400";
  }
}
